# Scheduled reconciler — keeps the curated env images current, autonomously.
#
# This is aarch.science's analogue of aarchbio's reconciler, but the trigger differs
# (DESIGN D2/OQ4): conda-forge has no per-env "new tag" event to watch. Instead, for
# each committed env spec (envs/<name>.yaml) the reconciler runs a CHEAP dry-run
# solve (builder/solve-hash.sh) and compares the resolved lock-hash against the
# committed envs/<name>.lock.txt. If they differ, the channel moved underneath the
# spec -> dispatch a rebuild via publish.yml. If they match, no-op.
#
# Runs on hosted arm64 runners (no farm dependency) — it only ever handles the
# delta, and the solve is just an API/solver call, so hosted speed is fine and it
# survives the farm being offline.
#
# GUARDRAILS (mirrors aarchbio — it can trigger writes to a public registry):
#  - additive only: never deletes or unpublishes anything.
#  - idempotent: build-env.sh no-ops if the resolved set hasn't actually changed
#    (the published s<lock-hash> tag already exists).
#  - concurrency-guarded: won't overlap a previous run.
#  - the rebuild still passes the D3 smoke gate before it can publish.

name: reconcile

on:
  schedule:
    - cron: '23 7 * * *'   # daily at 07:23 UTC (off the hour to dodge cron congestion)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Compute the drift but do not dispatch rebuilds'
        required: false
        default: 'false'
        type: string
      set_public:
        description: 'Pass through to publish.yml (flip rebuilt repos public)'
        required: false
        default: 'false'
        type: string
      include_stuck:
        description: 'Also re-check skip-list "stuck" envs this run (monthly otherwise)'
        required: false
        default: 'false'
        type: string

concurrency:
  group: reconcile
  cancel-in-progress: false   # let a running reconcile finish; don't stack

permissions:
  contents: read
  actions: write   # to dispatch publish.yml

jobs:
  reconcile:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Compute drift (re-solve each env spec, compare committed lock-hash)
        id: drift
        env:
          # 'stuck' skip-list entries re-check on the 1st of the month or on a
          # manual dispatch with include_stuck; the daily run skips them.
          INCLUDE_STUCK: ${{ inputs.include_stuck }}
        run: |
          set -uo pipefail
          drifted=(); skipped=0

          # Read the skip-list (farm/skip-list.tsv): map an "env:<name>" or a plain
          # env name to its tier. We skip a whole env if it (or a package it needs)
          # is a recorded dead-end. wontfix = never; stuck = daily-skip/monthly-retry.
          today_day="$(date -u +%d | sed 's/^0//')"
          include_stuck=0
          { [ "$INCLUDE_STUCK" = "true" ] || [ "$today_day" = "1" ]; } && include_stuck=1
          skip_tier() {  # echo the tier for an env name, or empty
            [ -f farm/skip-list.tsv ] || return 0
            awk -F'\t' -v e="env:$1" -v p="$1" \
              '!/^#/ && NF>=2 && ($1==e || $1==p){print $2; exit}' farm/skip-list.tsv
          }

          # The tracked set = every committed env spec. The catalog tracks itself.
          for spec in envs/*.yaml; do
            env_name="$(basename "$spec" .yaml)"
            tier="$(skip_tier "$env_name")"
            if [ "$tier" = "wontfix" ]; then
              echo "$env_name skipped (skip-list: wontfix)"; skipped=$((skipped+1)); continue
            fi
            if [ "$tier" = "stuck" ] && [ "$include_stuck" = "0" ]; then
              echo "$env_name skipped (skip-list: stuck — revisits monthly)"; skipped=$((skipped+1)); continue
            fi
            lock="envs/${env_name}.lock.txt"
            if [ ! -f "$lock" ]; then
              echo "::notice::$env_name has no committed lock yet -> queue build"
              drifted+=("$env_name"); continue
            fi
            committed="$(grep -m1 'lock-hash:' "$lock" | sed -E 's/.*lock-hash: *([0-9a-f]+).*/\1/')"
            out="$(mktemp)"
            if ! GITHUB_OUTPUT="$out" ./builder/solve-hash.sh "$env_name"; then
              echo "::warning::$env_name failed to solve on arm64 — skipping this run"
              continue
            fi
            current="$(grep '^lock_hash=' "$out" | cut -d= -f2-)"
            if [ "$current" != "$committed" ]; then
              echo "::notice::$env_name DRIFTED: committed=$committed current=$current -> rebuild"
              drifted+=("$env_name")
            else
              echo "$env_name up to date ($committed)"
            fi
          done
          echo "envs=${drifted[*]}" >> "$GITHUB_OUTPUT"
          echo "count=${#drifted[@]}" >> "$GITHUB_OUTPUT"
          echo "::notice::reconcile drift = ${#drifted[@]} env(s): ${drifted[*]:-none} (skip-list skipped: ${skipped})"

      - name: Dispatch rebuilds for the drifted envs
        if: ${{ steps.drift.outputs.count != '0' && inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" \
            -f envs="${{ steps.drift.outputs.envs }}" \
            -f set_public="${{ inputs.set_public || 'false' }}"
          echo "::notice::dispatched publish.yml for: ${{ steps.drift.outputs.envs }}"

      - name: Summary
        run: |
          echo "Reconcile run: ${{ steps.drift.outputs.count }} env(s) drifted" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.drift.outputs.envs }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
